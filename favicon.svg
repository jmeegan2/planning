<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pencil body -->
  <g transform="rotate(-35 32 32)">
    <!-- Main yellow body -->
    <rect x="22" y="8" width="10" height="44" fill="#F7C948"/>
    <!-- Darker yellow side -->
    <rect x="28" y="8" width="4" height="44" fill="#E8B430"/>
    <!-- Pink eraser -->
    <rect x="22" y="4" width="10" height="7" rx="1" fill="#F5A0B1"/>
    <!-- Metal band -->
    <rect x="22" y="11" width="10" height="3" fill="#B8B8B8"/>
    <rect x="22" y="12" width="10" height="1" fill="#A0A0A0"/>
  </g>
  <!-- Pencil tip -->
  <polygon points="11.5,57 8,63 18,58.5" fill="#F7C948"/>
  <polygon points="8,63 11.5,57 14,59" fill="#E8B430"/>
  <!-- Graphite tip -->
  <polygon points="8,63 10.5,59 12,60.5" fill="#3A3A3A"/>
</svg>
